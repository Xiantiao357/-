server:
  port: 8081

logging:
  level:
    root: INFO
    com.example.ecommerce: DEBUG
    org.springframework.security: DEBUG

spring:
  datasource:
    url: jdbc:h2:mem:ecommerce_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: admin
    password: password
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

  h2:
    console:
      enabled: true
      path: /h2-console

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
  mapper-locations: classpath:mapper/*.xml

jwt:
  secret: ecommerce_jwt_secret_key_2024_spring_boot_mybatis_plus
  expire: 86400000
